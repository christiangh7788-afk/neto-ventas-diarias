<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Neto - Avance de Ventas</title>
<style>
:root{--blue:#1D4ED8;--blue-dark:#1E3A8A;--blue-light:#DBEAFE;--blue-mid:#3B82F6;--orange:#F97316;--orange-light:#FFF7ED;--green:#16A34A;--red:#DC2626;--text:#1E293B;--text-mid:#475569;--text-light:#94A3B8;--bg:#FFF;--bg-soft:#F8FAFC;--border-light:#BFDBFE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-soft);color:var(--text)}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
.header{background:linear-gradient(135deg,var(--blue),var(--blue-dark));padding:18px 16px;border-bottom:3px solid var(--orange)}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:2px solid var(--blue);display:flex;padding:6px 0 env(safe-area-inset-bottom,8px)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:8px 0;color:var(--text-light);font-size:10px;font-weight:700}.tab-btn.active{color:var(--blue)}
.tab-btn span:first-child{font-size:18px}
.card{background:var(--bg);border-radius:12px;border:1.5px solid var(--border-light);padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.card:active{border-color:var(--blue)}
.progress-bg{width:100%;background:var(--blue-light);border-radius:6px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;transition:width .4s ease}
.metric-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border-light)}
.section{background:var(--bg);border-radius:14px;padding:14px;border:1px solid var(--border-light);margin-bottom:12px}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.edit-field label{font-size:10px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.edit-field input{background:var(--bg-soft);border:1.5px solid var(--border-light);border-radius:8px;padding:10px 12px;color:var(--text);font-size:15px;font-family:monospace;outline:none;width:100%}.edit-field input:focus{border-color:var(--blue)}
.btn{border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;font-size:14px;width:100%;margin-bottom:10px}
.toast{position:fixed;top:16px;left:16px;right:16px;z-index:300;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;color:#fff;animation:sd .3s ease}
@keyframes sd{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.period-btn{flex:1;padding:10px 6px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;text-transform:capitalize;border:1px solid var(--border-light);background:var(--bg);color:var(--text-mid)}.period-btn.active{border:2px solid var(--blue);background:var(--blue);color:#fff}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;
const API="https://script.google.com/macros/s/AKfycbzpLwSl26JgOr0c30V_0HNXsA2luJorNNu_UmHttG9WBjscB4kAQu6WslFmiUUndnCP/exec";

function pct(r,o){return o?(r/o)*100:0}
function fmt(n){return Number(n).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2})}
function dKey(d){const x=d||new Date();return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`}
function getWeekNum(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));return Math.ceil((((dt-new Date(Date.UTC(dt.getUTCFullYear(),0,1)))/86400000)+1)/7)}
function getWeekKey(d){return`${d.getFullYear()}-W${String(getWeekNum(d)).padStart(2,"0")}`}
const MN=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DN=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const fDate=d=>`${DN[d.getDay()]} ${d.getDate()} de ${MN[d.getMonth()]} ${d.getFullYear()}`;

// New day: keep name + all objectives, reset objetivo_dia and ALL reals to 0
function newDayFromPrev(b){return{
  id:b.id, name:b.name,
  objetivoDia:0,        // reset
  ventaReal:0,           // reset
  loterObj:b.loterObj,   // keep
  loterReal:0,           // reset
  adopObj:b.adopObj,     // keep
  adopReal:0,            // reset
  serviciosObj:b.serviciosObj, // keep
  serviciosReal:0,       // reset
  recargasObj:b.recargasObj,   // keep
  recargasReal:0,        // reset
  paketeObj:b.paketeObj, // keep
  paketeReal:0,          // reset
  ciclicosObj:b.ciclicosObj,   // keep
  ciclicosReal:0,        // reset
  manualesObj:b.manualesObj,   // keep
  manualesReal:0         // reset
}}

function defaultBranch(id,name){return{id,name:name||`Sucursal ${id}`,objetivoDia:0,ventaReal:0,loterObj:10,loterReal:0,adopObj:30,adopReal:0,serviciosObj:10,serviciosReal:0,recargasObj:150,recargasReal:0,paketeObj:10,paketeReal:0,ciclicosObj:2,ciclicosReal:0,manualesObj:2,manualesReal:0}}

async function apiSaveOne(b,fecha){try{const p=new URLSearchParams({action:"save",fecha,sucursal_id:b.id,sucursal_nombre:b.name,objetivo_dia:b.objetivoDia,venta_real:b.ventaReal,loter_obj:b.loterObj,loter_real:b.loterReal,adop_obj:b.adopObj,adop_real:b.adopReal,servicios_obj:b.serviciosObj,servicios_real:b.serviciosReal,recargas_obj:b.recargasObj,recargas_real:b.recargasReal,pakete_obj:b.paketeObj,pakete_real:b.paketeReal,ciclicos_obj:b.ciclicosObj,ciclicos_real:b.ciclicosReal,manuales_obj:b.manualesObj,manuales_real:b.manualesReal});const r=await fetch(`${API}?${p}`);return await r.json();}catch(e){return null;}}
async function apiRead(fecha){try{const r=await fetch(`${API}?action=read${fecha?"&fecha="+fecha:""}`);return await r.json();}catch(e){return null;}}
function fromApi(r){return{id:Number(r.sucursal_id),name:r.sucursal_nombre||`Sucursal ${r.sucursal_id}`,objetivoDia:Number(r.objetivo_dia)||0,ventaReal:Number(r.venta_real)||0,loterObj:Number(r.loter_obj)||0,loterReal:Number(r.loter_real)||0,adopObj:Number(r.adop_obj)||0,adopReal:Number(r.adop_real)||0,serviciosObj:Number(r.servicios_obj)||0,serviciosReal:Number(r.servicios_real)||0,recargasObj:Number(r.recargas_obj)||0,recargasReal:Number(r.recargas_real)||0,paketeObj:Number(r.pakete_obj)||0,paketeReal:Number(r.pakete_real)||0,ciclicosObj:Number(r.ciclicos_obj)||0,ciclicosReal:Number(r.ciclicos_real)||0,manualesObj:Number(r.manuales_obj)||0,manualesReal:Number(r.manuales_real)||0}}

function Donut({percentage:p,size:s=120}){const r=(s-14)/2,c=2*Math.PI*r,f=Math.min(p,100),o=c-(f/100)*c;const cl=f>=80?"var(--green)":f>=50?"var(--blue)":f>=25?"var(--orange)":"var(--red)";return<svg width={s} height={s} style={{display:"block",margin:"0 auto"}}><circle cx={s/2} cy={s/2} r={r} fill="none" stroke="var(--border-light)" strokeWidth="9"/><circle cx={s/2} cy={s/2} r={r} fill="none" stroke={cl} strokeWidth="9" strokeDasharray={c} strokeDashoffset={o} strokeLinecap="round" transform={`rotate(-90 ${s/2} ${s/2})`} style={{transition:"stroke-dashoffset .6s ease"}}/><text x="50%" y="50%" textAnchor="middle" dy=".35em" style={{fontSize:s*.21,fontWeight:800,fill:"var(--text)",fontFamily:"monospace"}}>{f.toFixed(1)}%</text></svg>}
function Prog({value:v,max:m,color:c="var(--blue)"}){const p=m?Math.min((v/m)*100,100):0;return<div className="progress-bg"><div className="progress-fill" style={{width:`${p}%`,background:(m&&v>m)?"var(--green)":c}}/></div>}
function MRow({label:l,obj:o,real:r,isMoney:$,color:c="var(--blue)"}){const a=pct(r,o);return<div className="metric-row"><span style={{width:80,fontSize:12,color:"var(--text-mid)",fontWeight:600}}>{l}</span><span style={{width:62,fontSize:11,color:"var(--text-light)",textAlign:"right"}}>{$?"$":""}{$?fmt(o):o}</span><span style={{width:62,fontSize:11,color:"var(--text)",textAlign:"right",fontWeight:700}}>{$?"$":""}{$?fmt(r):r}</span><div style={{flex:1}}><Prog value={r} max={o} color={c}/></div><span style={{width:52,fontSize:11,textAlign:"right",fontWeight:700,color:a>=100?"var(--green)":a>=50?"var(--blue)":"var(--red)"}}>{a.toFixed(1)}%</span></div>}
function EF({label:l,value:v,onChange:fn,step:s}){return<div className="edit-field"><label>{l}</label><input type="number" step={s||1} min={0} value={v} onChange={e=>fn(Number(e.target.value)||0)}/></div>}
function Toast({msg,type,onDone}){useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t)},[]);return<div className="toast" style={{background:type==="ok"?"var(--green)":type==="error"?"var(--red)":"var(--orange)"}}>{msg}</div>}
function RenameInput({branch,onSave}){const[val,setVal]=useState(branch.name);useEffect(()=>{setVal(branch.name)},[branch.name]);return<input value={val} onChange={e=>setVal(e.target.value)} onBlur={()=>{if(val.trim()&&val!==branch.name)onSave(branch.id,val.trim())}} onKeyDown={e=>{if(e.key==="Enter")e.target.blur()}} style={{flex:1,background:"var(--bg)",border:"1px solid var(--border-light)",borderRadius:8,padding:"6px 10px",fontSize:14,outline:"none",color:"var(--text)"}}/>}

function ZonaSummary({branches,allHistory}){
  const[periodo,setPeriodo]=useState("diario");const today=new Date();const todayKey=dKey(today);const thisWeek=getWeekKey(today);const thisMonth=todayKey.substring(0,7);
  const sf=f=>branches.reduce((s,b)=>s+(b[f]||0),0);
  const todayData={ventaObj:sf("objetivoDia"),ventaReal:sf("ventaReal"),loterObj:sf("loterObj"),loterReal:sf("loterReal"),adopObj:sf("adopObj"),adopReal:sf("adopReal"),serviciosObj:sf("serviciosObj"),serviciosReal:sf("serviciosReal"),recargasObj:sf("recargasObj"),recargasReal:sf("recargasReal"),paketeObj:sf("paketeObj"),paketeReal:sf("paketeReal"),ciclicosObj:sf("ciclicosObj"),ciclicosReal:sf("ciclicosReal"),manualesObj:sf("manualesObj"),manualesReal:sf("manualesReal")};
  const hbd={};(allHistory||[]).forEach(row=>{const f=String(row.fecha||"").substring(0,10);if(!f||f.length<10)return;if(!hbd[f])hbd[f]={ventaObj:0,ventaReal:0,loterObj:0,loterReal:0,adopObj:0,adopReal:0,serviciosObj:0,serviciosReal:0,recargasObj:0,recargasReal:0,paketeObj:0,paketeReal:0,ciclicosObj:0,ciclicosReal:0,manualesObj:0,manualesReal:0};const h=hbd[f];h.ventaObj+=Number(row.objetivo_dia)||0;h.ventaReal+=Number(row.venta_real)||0;h.loterObj+=Number(row.loter_obj)||0;h.loterReal+=Number(row.loter_real)||0;h.adopObj+=Number(row.adop_obj)||0;h.adopReal+=Number(row.adop_real)||0;h.serviciosObj+=Number(row.servicios_obj)||0;h.serviciosReal+=Number(row.servicios_real)||0;h.recargasObj+=Number(row.recargas_obj)||0;h.recargasReal+=Number(row.recargas_real)||0;h.paketeObj+=Number(row.pakete_obj)||0;h.paketeReal+=Number(row.pakete_real)||0;h.ciclicosObj+=Number(row.ciclicos_obj)||0;h.ciclicosReal+=Number(row.ciclicos_real)||0;h.manualesObj+=Number(row.manuales_obj)||0;h.manualesReal+=Number(row.manuales_real)||0});
  hbd[todayKey]=todayData;const entries=Object.entries(hbd);
  const we=entries.filter(([k])=>{try{return getWeekKey(new Date(k+"T12:00:00"))===thisWeek}catch{return false}});
  const me=entries.filter(([k])=>k.substring(0,7)===thisMonth);
  function agg(a){const b={ventaObj:0,ventaReal:0,loterObj:0,loterReal:0,adopObj:0,adopReal:0,serviciosObj:0,serviciosReal:0,recargasObj:0,recargasReal:0,paketeObj:0,paketeReal:0,ciclicosObj:0,ciclicosReal:0,manualesObj:0,manualesReal:0,days:0};a.forEach(([,s])=>{Object.keys(b).forEach(k=>{if(k!=="days"&&s[k]!==undefined)b[k]+=s[k]});b.days++});return b}
  const data=periodo==="diario"?{...todayData,days:1}:periodo==="semanal"?agg(we):agg(me);
  const pl=periodo==="diario"?"Hoy":periodo==="semanal"?`Semana ${thisWeek.split("-W")[1]}`:MN[today.getMonth()];
  const dc=data.days||1;const av=pct(data.ventaReal,data.ventaObj);
  const rk=[...branches].sort((a,b)=>pct(b.ventaReal,b.objetivoDia)-pct(a.ventaReal,a.objetivoDia));
  const sh=periodo!=="diario"?(periodo==="semanal"?we:me).sort((a,b)=>b[0].localeCompare(a[0])):[];
  return<div style={{padding:"0 14px 100px"}}>
    <div style={{textAlign:"center",padding:"16px 0 0"}}><div style={{background:"var(--blue-light)",borderRadius:10,padding:"10px 16px",display:"inline-block",border:"1px solid var(--border-light)"}}><span style={{fontSize:13,fontWeight:700,color:"var(--blue)"}}>📅 {fDate(today)}</span></div></div>
    <div style={{display:"flex",gap:8,padding:"12px 0 0"}}>{["diario","semanal","mensual"].map(p=><button key={p} className={`period-btn ${periodo===p?"active":""}`} onClick={()=>setPeriodo(p)}>{p}</button>)}</div>
    <div style={{padding:"10px 0 0",fontSize:13,color:"var(--text-light)",fontWeight:600}}>{pl} — {dc} día{dc>1?"s":""}</div>
    <div style={{padding:"10px 0 0"}}><div style={{background:"var(--bg)",borderRadius:16,padding:20,border:"2px solid var(--blue)",display:"flex",alignItems:"center",gap:20}}><Donut percentage={av} size={110}/><div style={{flex:1}}><div style={{fontSize:11,color:"var(--text-light)"}}>Objetivo Zona</div><div style={{fontSize:20,fontWeight:800,fontFamily:"monospace"}}>${fmt(data.ventaObj)}</div><div style={{fontSize:11,color:"var(--text-light)",marginTop:8}}>Venta Real</div><div style={{fontSize:18,fontWeight:700,color:"var(--blue)",fontFamily:"monospace"}}>${fmt(data.ventaReal)}</div><div style={{fontSize:11,color:"var(--text-light)",marginTop:8}}>Faltante</div><div style={{fontSize:15,fontWeight:600,color:"var(--orange)",fontFamily:"monospace"}}>${fmt(Math.max(data.ventaObj-data.ventaReal,0))}</div></div></div></div>
    <div style={{padding:"12px 0 0",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div style={{background:"var(--bg)",borderRadius:12,padding:"14px 16px",borderLeft:"4px solid var(--orange)",border:"1px solid var(--border-light)",borderLeftWidth:4,borderLeftColor:"var(--orange)"}}><div style={{fontSize:10,color:"var(--text-light)",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Promedio/Día</div><div style={{fontSize:18,fontWeight:800,fontFamily:"monospace"}}>${fmt(dc?data.ventaReal/dc:0)}</div></div><div style={{background:"var(--bg)",borderRadius:12,padding:"14px 16px",borderLeft:"4px solid var(--blue)",border:"1px solid var(--border-light)",borderLeftWidth:4,borderLeftColor:"var(--blue)"}}><div style={{fontSize:10,color:"var(--text-light)",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Obj. Promedio</div><div style={{fontSize:18,fontWeight:800,fontFamily:"monospace"}}>${fmt(dc?data.ventaObj/dc:0)}</div></div></div>
    <div style={{paddingTop:16}}><div className="section"><div style={{fontSize:14,fontWeight:700,color:"var(--blue)",marginBottom:10}}>Desglose — {pl}</div><MRow label="Loter" obj={data.loterObj} real={data.loterReal} color="var(--orange)"/><MRow label="Adop" obj={data.adopObj} real={data.adopReal} color="#7C3AED"/><MRow label="Servicios" obj={data.serviciosObj} real={data.serviciosReal} color="var(--blue-mid)"/><MRow label="Recargas" obj={data.recargasObj} real={data.recargasReal} isMoney color="var(--orange)"/><MRow label="Pakete" obj={data.paketeObj} real={data.paketeReal} color="#DB2777"/><MRow label="Cíclicos" obj={data.ciclicosObj} real={data.ciclicosReal} color="var(--green)"/><MRow label="Manuales" obj={data.manualesObj} real={data.manualesReal} color="#0D9488"/></div></div>
    {periodo==="diario"&&<><div className="section"><div style={{fontSize:14,fontWeight:700,color:"var(--green)",marginBottom:10}}>🏆 Top</div>{rk.slice(0,3).map((b,i)=>{const bp=pct(b.ventaReal,b.objetivoDia);return<div key={b.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid var(--blue-light)"}}><span style={{fontSize:16,width:26}}>{["🥇","🥈","🥉"][i]}</span><span style={{flex:1,fontSize:13,fontWeight:600}}>{b.name}</span><span style={{fontSize:12,color:"var(--text-light)"}}>${fmt(b.ventaReal)}</span><span style={{fontSize:12,fontWeight:800,color:bp>=50?"var(--green)":"var(--orange)",width:50,textAlign:"right"}}>{bp.toFixed(1)}%</span></div>})}</div><div className="section"><div style={{fontSize:14,fontWeight:700,color:"var(--red)",marginBottom:10}}>⚠️ Atención</div>{rk.slice(-3).reverse().map(b=>{const bp=pct(b.ventaReal,b.objetivoDia);return<div key={b.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid var(--blue-light)"}}><span style={{fontSize:13,width:26,textAlign:"center",color:"var(--red)"}}>▼</span><span style={{flex:1,fontSize:13,fontWeight:600}}>{b.name}</span><span style={{fontSize:12,color:"var(--text-light)"}}>${fmt(b.ventaReal)}</span><span style={{fontSize:12,fontWeight:800,color:"var(--red)",width:50,textAlign:"right"}}>{bp.toFixed(1)}%</span></div>})}</div></>}
    {periodo!=="diario"&&sh.length>0&&<div className="section"><div style={{fontSize:14,fontWeight:700,color:"#7C3AED",marginBottom:10}}>📋 Historial</div>{sh.map(([dk,sn])=>{const dp=pct(sn.ventaReal,sn.ventaObj);const c2=dp>=80?"var(--green)":dp>=50?"var(--blue)":dp>=25?"var(--orange)":"var(--red)";const ps=dk.split("-");return<div key={dk} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--blue-light)"}}><span style={{fontSize:13,color:"var(--text-mid)",fontWeight:600,width:50}}>{ps[2]}/{ps[1]}</span><div style={{flex:1}}><Prog value={sn.ventaReal} max={sn.ventaObj} color={c2}/></div><span style={{fontSize:12,color:"var(--text-light)",width:90,textAlign:"right"}}>${fmt(sn.ventaReal)}</span><span style={{fontSize:13,fontWeight:800,color:c2,width:50,textAlign:"right"}}>{dp.toFixed(0)}%</span></div>})}</div>}
    <div className="section"><div style={{fontSize:14,fontWeight:700,color:"var(--blue)",marginBottom:10}}>🏪 Por Sucursal</div>{branches.map(b=>{const bp=pct(b.ventaReal,b.objetivoDia),bc=bp>=80?"var(--green)":bp>=50?"var(--blue)":bp>=25?"var(--orange)":"var(--red)";return<div key={b.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid var(--blue-light)"}}><span style={{width:80,fontSize:11,color:"var(--text-mid)",fontWeight:600}}>{b.name}</span><div style={{flex:1}}><Prog value={b.ventaReal} max={b.objetivoDia} color={bc}/></div><span style={{fontSize:11,color:"var(--text-light)",width:78,textAlign:"right"}}>${fmt(b.ventaReal)}</span><span style={{fontSize:11,fontWeight:800,color:bc,width:46,textAlign:"right"}}>{bp.toFixed(1)}%</span></div>})}</div>
  </div>
}

function App(){
  const[branches,setB]=useState([]);const[allHistory,setAH]=useState([]);
  const[selId,setSel]=useState(null);const[edit,setEdit]=useState(false);const[editData,setED]=useState(null);
  const[tab,setTab]=useState("sucursales");const[now,setNow]=useState(new Date());
  const[syncing,setSy]=useState(false);const[saving,setSv]=useState(false);
  const[online,setOn]=useState(false);const[lastSync,setLS]=useState(null);
  const[loaded,setLd]=useState(false);const[toast,setT]=useState(null);const[newName,setNN]=useState("");

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t)},[]);

  async function loadSheet(){
    setSy(true);const today=dKey();
    const rt=await apiRead(today);const ra=await apiRead();
    if(rt?.status==="ok"){
      setOn(true);setLS(Date.now());
      if(rt.data?.length>0){
        setB(rt.data.map(fromApi).sort((a,b)=>a.id-b.id));
        setT({msg:`✓ ${rt.data.length} sucursales cargadas`,type:"ok"});
      } else if(ra?.status==="ok"&&ra.data?.length>0){
        // NEW DAY: find last day, keep names + objectives, reset obj_dia + all reals
        const dates=[...new Set(ra.data.map(r=>String(r.fecha||"").substring(0,10)))].filter(d=>d.length===10).sort().reverse();
        if(dates[0]){
          const lastRows=ra.data.filter(r=>String(r.fecha||"").substring(0,10)===dates[0]);
          const seen=new Set();const prev=[];
          lastRows.forEach(r=>{const id=Number(r.sucursal_id);if(!seen.has(id)){seen.add(id);prev.push(fromApi(r))}});
          const fresh=prev.map(newDayFromPrev).sort((a,b)=>a.id-b.id);
          setB(fresh);
          for(const b of fresh){await apiSaveOne(b,today);}
          setT({msg:`✓ Nuevo día — ${fresh.length} sucursales listas`,type:"ok"});
        } else setB([defaultBranch(1)]);
      } else setB([defaultBranch(1)]);
    } else {setB([defaultBranch(1)]);setT({msg:"⚠ Sin conexión",type:"error"});}
    if(ra?.status==="ok"&&ra.data)setAH(ra.data.filter(r=>String(r.fecha||"").substring(0,10)!==today));
    setSy(false);setLd(true);
  }
  useEffect(()=>{loadSheet()},[]);

  useEffect(()=>{if(!loaded)return;const t=setInterval(async()=>{
    if(edit)return;const res=await apiRead(dKey());
    if(res?.status==="ok"&&res.data?.length>0){setOn(true);setLS(Date.now());const rm=res.data.map(fromApi);setB(p=>{const ids=new Set(rm.map(b=>b.id));return[...rm,...p.filter(b=>!ids.has(b.id))].sort((a,b)=>a.id-b.id)})}
  },20000);return()=>clearInterval(t)},[loaded,edit]);

  function startEdit(b){setED({...b});setEdit(true)}
  function updateEdit(f,v){setED(p=>({...p,[f]:v}))}
  async function saveEdit(){if(!editData)return;setSv(true);const res=await apiSaveOne(editData,dKey());if(res?.status==="ok"){setB(p=>p.map(b=>b.id===editData.id?{...editData}:b));setOn(true);setLS(Date.now());setT({msg:"✓ Guardado",type:"ok"});setEdit(false);setED(null)}else setT({msg:"⚠ Error",type:"error"});setSv(false)}
  function cancelEdit(){setEdit(false);setED(null)}
  async function addBranch(){const name=newName.trim();if(!name){setT({msg:"Escribe un nombre",type:"error"});return}const mx=branches.reduce((m,b)=>Math.max(m,b.id),0);const nb=defaultBranch(mx+1,name);setB(p=>[...p,nb]);setNN("");setSv(true);const res=await apiSaveOne(nb,dKey());if(res?.status==="ok"){setOn(true);setLS(Date.now());setT({msg:`✓ "${name}" agregada`,type:"ok"})}else setT({msg:"⚠ Error",type:"error"});setSv(false)}
  async function renameBranch(id,nn){setB(p=>p.map(x=>x.id===id?{...x,name:nn}:x));const b=branches.find(x=>x.id===id);if(!b)return;setSv(true);const res=await apiSaveOne({...b,name:nn},dKey());if(res?.status==="ok"){setOn(true);setLS(Date.now());setT({msg:"✓ Renombrada",type:"ok"})}setSv(false)}
  function removeBranch(id){const b=branches.find(x=>x.id===id);if(branches.length<=1||!confirm(`¿Eliminar "${b?.name}"?`))return;setB(p=>p.filter(x=>x.id!==id))}

  const sel=branches.find(b=>b.id===selId);const tObj=branches.reduce((s,b)=>s+b.objetivoDia,0);const tReal=branches.reduce((s,b)=>s+b.ventaReal,0);const tPct=pct(tReal,tObj);const tStr=now.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});

  if(!loaded)return<div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{fontSize:40}}>🏪</div><div style={{fontSize:16,fontWeight:700,color:"var(--blue)"}}>Cargando datos...</div></div>;

  if(selId&&sel){
    const dd=edit&&editData?editData:sel;const ap=pct(dd.ventaReal,dd.objetivoDia);const falt=Math.max(dd.objetivoDia-dd.ventaReal,0);
    return<div style={{minHeight:"100vh",background:"var(--bg-soft)"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setT(null)}/>}
      <div style={{background:"var(--bg)",borderBottom:"2px solid var(--blue)",padding:"14px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:10}}>
        <button onClick={()=>{cancelEdit();setSel(null)}} style={{background:"none",border:"none",color:"var(--blue)",fontSize:22,cursor:"pointer"}}>←</button>
        <div style={{flex:1}}><div style={{fontSize:16,fontWeight:800}}>{dd.name}</div><div style={{fontSize:11,color:"var(--text-light)"}}>{fDate(now)} • {tStr}</div></div>
        <div style={{width:8,height:8,borderRadius:"50%",background:saving?"var(--orange)":online?"var(--green)":"var(--red)"}}/>
        {edit?<div style={{display:"flex",gap:6}}><button onClick={cancelEdit} style={{background:"var(--bg)",border:"1.5px solid var(--red)",borderRadius:8,color:"var(--red)",padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>✕</button><button onClick={saveEdit} disabled={saving} style={{background:"var(--green)",border:"none",borderRadius:8,color:"#fff",padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{saving?"⏳":"💾 Guardar"}</button></div>:<button onClick={()=>startEdit(sel)} style={{background:"var(--bg)",border:"1.5px solid var(--blue)",borderRadius:8,color:"var(--blue)",padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>✎ Editar</button>}
      </div>
      <div style={{padding:16}}><div style={{background:"var(--bg)",borderRadius:14,padding:18,display:"flex",alignItems:"center",gap:18,border:"2px solid var(--blue)"}}><Donut percentage={ap} size={100}/><div style={{flex:1}}><div style={{fontSize:11,color:"var(--text-light)"}}>Objetivo</div><div style={{fontSize:18,fontWeight:800,fontFamily:"monospace"}}>${fmt(dd.objetivoDia)}</div><div style={{fontSize:11,color:"var(--text-light)",marginTop:6}}>Venta real</div><div style={{fontSize:16,fontWeight:700,color:"var(--blue)",fontFamily:"monospace"}}>${fmt(dd.ventaReal)}</div><div style={{fontSize:11,color:"var(--text-light)",marginTop:6}}>Faltante</div><div style={{fontSize:14,fontWeight:600,color:"var(--orange)",fontFamily:"monospace"}}>${fmt(falt)}</div></div></div></div>
      {edit&&editData?<div style={{padding:"0 16px 40px"}}>
        <div className="section" style={{marginBottom:14}}><div className="edit-field"><label>Nombre</label><input value={editData.name} onChange={e=>updateEdit("name",e.target.value)} style={{fontWeight:700,fontSize:16,background:"var(--bg-soft)",border:"1.5px solid var(--border-light)",borderRadius:8,padding:"10px 12px",color:"var(--text)",outline:"none",width:"100%"}}/></div></div>
        <div className="section"><div className="edit-grid">
          <div style={{gridColumn:"1/-1",fontSize:13,fontWeight:700,color:"var(--blue)"}}>Objetivos</div>
          <EF label="Obj. Día ($)" value={editData.objetivoDia} onChange={v=>updateEdit("objetivoDia",v)} step={.01}/><EF label="Loter" value={editData.loterObj} onChange={v=>updateEdit("loterObj",v)}/><EF label="Adop" value={editData.adopObj} onChange={v=>updateEdit("adopObj",v)}/><EF label="Servicios" value={editData.serviciosObj} onChange={v=>updateEdit("serviciosObj",v)}/><EF label="Recargas ($)" value={editData.recargasObj} onChange={v=>updateEdit("recargasObj",v)} step={.01}/><EF label="Pakete" value={editData.paketeObj} onChange={v=>updateEdit("paketeObj",v)}/><EF label="Cíclicos" value={editData.ciclicosObj} onChange={v=>updateEdit("ciclicosObj",v)}/><EF label="Manuales" value={editData.manualesObj} onChange={v=>updateEdit("manualesObj",v)}/>
          <div style={{gridColumn:"1/-1",fontSize:13,fontWeight:700,color:"var(--green)",marginTop:8}}>Datos Reales</div>
          <EF label="Venta Real ($)" value={editData.ventaReal} onChange={v=>updateEdit("ventaReal",v)} step={.01}/><EF label="Loter" value={editData.loterReal} onChange={v=>updateEdit("loterReal",v)}/><EF label="Adop" value={editData.adopReal} onChange={v=>updateEdit("adopReal",v)}/><EF label="Servicios" value={editData.serviciosReal} onChange={v=>updateEdit("serviciosReal",v)}/><EF label="Recargas ($)" value={editData.recargasReal} onChange={v=>updateEdit("recargasReal",v)} step={.01}/><EF label="Pakete" value={editData.paketeReal} onChange={v=>updateEdit("paketeReal",v)}/><EF label="Cíclicos" value={editData.ciclicosReal} onChange={v=>updateEdit("ciclicosReal",v)}/><EF label="Manuales" value={editData.manualesReal} onChange={v=>updateEdit("manualesReal",v)}/>
        </div></div>
      </div>:<div style={{padding:"0 16px 40px"}}>
        <div className="section"><MRow label="Loter" obj={sel.loterObj} real={sel.loterReal} color="var(--orange)"/><MRow label="Adop" obj={sel.adopObj} real={sel.adopReal} color="#7C3AED"/><MRow label="Servicios" obj={sel.serviciosObj} real={sel.serviciosReal} color="var(--blue-mid)"/><MRow label="Recargas" obj={sel.recargasObj} real={sel.recargasReal} isMoney color="var(--orange)"/><MRow label="Pakete" obj={sel.paketeObj} real={sel.paketeReal} color="#DB2777"/></div>
        <div className="section"><div style={{fontSize:13,fontWeight:700,color:"var(--blue)",marginBottom:8}}>Conteos Diarios</div><MRow label="Cíclicos" obj={sel.ciclicosObj} real={sel.ciclicosReal} color="var(--green)"/><MRow label="Manuales" obj={sel.manualesObj} real={sel.manualesReal} color="#0D9488"/></div>
      </div>}
    </div>
  }

  return<div style={{minHeight:"100vh",background:"var(--bg-soft)"}}>
    {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setT(null)}/>}
    <div className="header">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:11,fontWeight:700,color:"var(--orange-light)",textTransform:"uppercase",letterSpacing:2}}>Neto</div><div style={{fontSize:20,fontWeight:800,color:"#fff"}}>Avance del Día</div></div><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:"50%",background:syncing?"var(--orange)":online?"var(--green)":"var(--red)"}}/><span style={{fontSize:10,color:"rgba(255,255,255,.8)",fontWeight:600}}>{syncing?"Cargando...":online?"Conectado":"Offline"}</span></div></div>
      <div style={{marginTop:8,fontSize:12,color:"rgba(255,255,255,.8)",fontWeight:600}}>📅 {fDate(now)} — {tStr}</div>
      <div style={{marginTop:12,display:"flex",alignItems:"center",gap:18,background:"rgba(255,255,255,.12)",borderRadius:14,padding:14}}><Donut percentage={tPct} size={85}/><div style={{flex:1}}><div style={{fontSize:10,color:"rgba(255,255,255,.7)"}}>Objetivo Total</div><div style={{fontSize:17,fontWeight:800,fontFamily:"monospace",color:"#fff"}}>${fmt(tObj)}</div><div style={{fontSize:10,color:"rgba(255,255,255,.7)",marginTop:5}}>Venta Total</div><div style={{fontSize:15,fontWeight:700,color:"#FED7AA",fontFamily:"monospace"}}>${fmt(tReal)}</div></div></div>
    </div>
    {tab==="sucursales"?<div style={{padding:"14px 14px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:12,fontWeight:700,color:"var(--text-light)",textTransform:"uppercase",letterSpacing:1}}>Sucursales ({branches.length})</span><button onClick={()=>loadSheet()} disabled={syncing} style={{background:"var(--blue-light)",border:"1px solid var(--border-light)",borderRadius:8,color:"var(--blue)",padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{syncing?"...":"🔄 Actualizar"}</button></div>
      {[...branches].sort((a,b)=>pct(b.ventaReal,b.objetivoDia)-pct(a.ventaReal,a.objetivoDia)).map(b=>{const bp=pct(b.ventaReal,b.objetivoDia),bc=bp>=80?"var(--green)":bp>=50?"var(--blue)":bp>=25?"var(--orange)":"var(--red)";return<div key={b.id} className="card" onClick={()=>{setSel(b.id);cancelEdit()}}><Donut percentage={bp} size={52}/><div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{b.name}</div><div style={{fontSize:11,color:"var(--text-light)",marginTop:2}}>Obj: ${fmt(b.objetivoDia)}</div><div style={{marginTop:5}}><Prog value={b.ventaReal} max={b.objetivoDia} color={bc}/></div><div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span style={{fontSize:11,color:"var(--text-light)"}}>Venta: <b style={{color:"var(--text)"}}>${fmt(b.ventaReal)}</b></span><span style={{fontSize:12,fontWeight:800,color:bc}}>{bp.toFixed(1)}%</span></div></div><div style={{color:"var(--border-light)",fontSize:18}}>›</div></div>})}
    </div>:tab==="zona"?<ZonaSummary branches={branches} allHistory={allHistory}/>:
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>Configuración</div>
      <div className="section"><div style={{fontSize:14,fontWeight:700,color:"var(--blue)",marginBottom:10}}>📡 Google Sheets</div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><div style={{width:10,height:10,borderRadius:"50%",background:online?"var(--green)":"var(--red)"}}/><span style={{fontSize:13,fontWeight:600}}>{online?"Conectado":"Sin conexión"}</span></div><div style={{fontSize:11,color:"var(--text-light)",marginBottom:10}}>Última sync: {lastSync?new Date(lastSync).toLocaleTimeString("es-MX"):"Nunca"}</div><button className="btn" style={{background:"var(--blue)",color:"#fff"}} onClick={loadSheet} disabled={syncing}>{syncing?"⏳":"🔄 Recargar Datos"}</button></div>
      <div className="section"><div style={{fontSize:14,fontWeight:700,color:"var(--orange)",marginBottom:12}}>🏪 Sucursales ({branches.length})</div>
        {branches.map((b,i)=><div key={b.id} style={{background:"var(--bg-soft)",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:8,marginBottom:6,border:"1px solid var(--border-light)"}}><span style={{fontSize:12,color:"var(--text-light)",fontWeight:700,width:22}}>{i+1}</span><RenameInput branch={b} onSave={renameBranch}/><button onClick={()=>removeBranch(b.id)} disabled={branches.length<=1} style={{background:"none",border:"1px solid var(--border-light)",borderRadius:6,color:branches.length<=1?"var(--border-light)":"var(--red)",padding:"4px 8px",fontSize:11,cursor:branches.length<=1?"not-allowed":"pointer"}}>✕</button></div>)}
        <div style={{marginTop:12,display:"flex",gap:8}}><input placeholder="Nombre nueva sucursal..." value={newName} onChange={e=>setNN(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addBranch()}} style={{flex:1,background:"var(--bg)",border:"1.5px solid var(--border-light)",borderRadius:8,padding:"10px 12px",fontSize:14,outline:"none",color:"var(--text)"}}/><button onClick={addBranch} disabled={saving} style={{background:"var(--blue)",border:"none",borderRadius:8,color:"#fff",padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>{saving?"⏳":"+ Agregar"}</button></div>
      </div>
    </div>}
    <div className="tab-bar">{[{id:"sucursales",l:"Sucursales",i:"🏪"},{id:"zona",l:"Zona",i:"📊"},{id:"config",l:"Config",i:"⚙️"}].map(t=><button key={t.id} className={`tab-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}><span>{t.i}</span><span>{t.l}</span></button>)}</div>
  </div>
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
