<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Neto - Avance de Ventas</title>
<style>
:root{--blue:#1D4ED8;--blue-dark:#1E3A8A;--blue-light:#DBEAFE;--blue-mid:#3B82F6;--orange:#F97316;--orange-light:#FFF7ED;--green:#16A34A;--red:#DC2626;--text:#1E293B;--text-mid:#475569;--text-light:#94A3B8;--bg:#FFF;--bg-soft:#F8FAFC;--border-light:#BFDBFE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-soft);color:var(--text)}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
.header{background:linear-gradient(135deg,var(--blue),var(--blue-dark));padding:18px 16px;border-bottom:3px solid var(--orange)}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:2px solid var(--blue);display:flex;padding:6px 0 env(safe-area-inset-bottom,8px)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:8px 0;color:var(--text-light);font-size:10px;font-weight:700}.tab-btn.active{color:var(--blue)}
.tab-btn span:first-child{font-size:18px}
input[type=date]{color-scheme:dark}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.7;cursor:pointer}
.card{background:var(--bg);border-radius:12px;border:1.5px solid var(--border-light);padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.card:active{border-color:var(--blue)}
.progress-bg{width:100%;background:var(--blue-light);border-radius:6px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;transition:width .4s ease}
.metric-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border-light)}
.section{background:var(--bg);border-radius:14px;padding:14px;border:1px solid var(--border-light);margin-bottom:12px}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.edit-field label{font-size:10px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.edit-field input{background:var(--bg-soft);border:1.5px solid var(--border-light);border-radius:8px;padding:10px 12px;color:var(--text);font-size:15px;font-family:monospace;outline:none;width:100%}.edit-field input:focus{border-color:var(--blue)}
.btn{border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;font-size:14px;width:100%;margin-bottom:10px}
.toast{position:fixed;top:16px;left:16px;right:16px;z-index:300;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;color:#fff;animation:sd .3s ease}
@keyframes sd{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.period-btn{flex:1;padding:10px 6px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;text-transform:capitalize;border:1px solid var(--border-light);background:var(--bg);color:var(--text-mid)}.period-btn.active{border:2px solid var(--blue);background:var(--blue);color:#fff}
.login-bg{min-height:100vh;background:linear-gradient(135deg,var(--blue),var(--blue-dark));display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg);border-radius:20px;padding:30px 24px;width:100%;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.login-title{font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:2px;text-align:center}
.login-h1{font-size:22px;font-weight:800;color:var(--text);text-align:center;margin:6px 0 20px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.login-field select,.login-field input{width:100%;padding:12px;border:2px solid var(--border-light);border-radius:10px;font-size:15px;outline:none;color:var(--text);background:var(--bg-soft)}
.login-field select:focus,.login-field input:focus{border-color:var(--blue)}
.login-btn{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.login-btn:disabled{background:var(--text-light);cursor:not-allowed}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:10px;font-weight:600}
.zone-badge{background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;margin-left:8px}
</style>
</head>
<body>
<div id="app"></div>

function pct(r,o){return o?(r/o)*100:0}

function newDayFromPrev(b){return{id:b.id,name:b.name,objetivoDia:0,ventaReal:0,ventaEspecialObj:b.ventaEspecialObj,ventaEspecialReal:0,loterObj:b.loterObj,loterReal:0,adopObj:b.adopObj,adopReal:0,serviciosObj:b.serviciosObj,serviciosReal:0,recargasObj:b.recargasObj,recargasReal:0,paketeObj:b.paketeObj,paketeReal:0,ciclicosObj:b.ciclicosObj,ciclicosReal:0,manualesObj:b.manualesObj,manualesReal:0}}

function apiSaveOne(b,fecha,zona,pw){const p=new URLSearchParams({action:"save",zona,pw,fecha,sucursal_id:b.id,sucursal_nombre:b.name,objetivo_dia:b.objetivoDia,venta_real:b.ventaReal,venta_especial_obj:b.ventaEspecialObj,venta_especial_real:b.ventaEspecialReal,loter_obj:b.loterObj,loter_real:b.loterReal,adop_obj:b.adopObj,adop_real:b.adopReal,servicios_obj:b.serviciosObj,servicios_real:b.serviciosReal,recargas_obj:b.recargasObj,recargas_real:b.recargasReal,pakete_obj:b.paketeObj,pakete_real:b.paketeReal,ciclicos_obj:b.ciclicosObj,ciclicos_real:b.ciclicosReal,manuales_obj:b.manualesObj,manuales_real:b.manualesReal});return fetch(`${API}?${p}`).then(r=>r.json()).catch(()=>null)}
