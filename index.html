<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Neto - Avance de Ventas</title>
<style>
:root{--blue:#1D4ED8;--blue-dark:#1E3A8A;--blue-light:#DBEAFE;--blue-mid:#3B82F6;--orange:#F97316;--orange-light:#FFF7ED;--green:#16A34A;--red:#DC2626;--text:#1E293B;--text-mid:#475569;--text-light:#94A3B8;--bg:#FFF;--bg-soft:#F8FAFC;--border-light:#BFDBFE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-soft);color:var(--text)}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
.header{background:linear-gradient(135deg,var(--blue),var(--blue-dark));padding:18px 16px;border-bottom:3px solid var(--orange)}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:2px solid var(--blue);display:flex;padding:6px 0 env(safe-area-inset-bottom,8px)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:8px 0;color:var(--text-light);font-size:10px;font-weight:700}.tab-btn.active{color:var(--blue)}
.tab-btn span:first-child{font-size:18px}
.card{background:var(--bg);border-radius:12px;border:1.5px solid var(--border-light);padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.card:active{border-color:var(--blue)}
.progress-bg{width:100%;background:var(--blue-light);border-radius:6px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;transition:width .4s ease}
.metric-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border-light)}
.section{background:var(--bg);border-radius:14px;padding:14px;border:1px solid var(--border-light);margin-bottom:12px}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.edit-field label{font-size:10px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.edit-field input{background:var(--bg-soft);border:1.5px solid var(--border-light);border-radius:8px;padding:10px 12px;color:var(--text);font-size:15px;font-family:monospace;outline:none;width:100%}.edit-field input:focus{border-color:var(--blue)}
.btn{border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;font-size:14px;width:100%;margin-bottom:10px}
.toast{position:fixed;top:16px;left:16px;right:16px;z-index:300;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;color:#fff;animation:sd .3s ease}
@keyframes sd{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow:auto;padding:20px 20px 40px;border:2px solid var(--blue);border-bottom:none}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;
const API="https://script.google.com/macros/s/AKfycbzpLwSl26JgOr0c30V_0HNXsA2luJorNNu_UmHttG9WBjscB4kAQu6WslFmiUUndnCP/exec";
const INIT={objetivoDia:21992.08,ventaReal:0,loterObj:10,loterReal:0,adopObj:30,adopReal:0,serviciosObj:10,serviciosReal:0,recargasObj:150,recargasReal:0,paketeObj:10,paketeReal:0,ciclicosObj:2,ciclicosReal:0,manualesObj:2,manualesReal:0};
const mkB=(id,n)=>({id,name:n||`Sucursal ${id}`,...JSON.parse(JSON.stringify(INIT))});

function pct(r,o){return o?(r/o)*100:0}
function fmt(n){return Number(n).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2})}
function dKey(d){const x=d||new Date();return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`}
const MN=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DN=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const fDate=d=>`${DN[d.getDay()]} ${d.getDate()} de ${MN[d.getMonth()]} ${d.getFullYear()}`;

// Save ONE branch via GET (short URL)
async function apiSaveOne(b,fecha){
  try{
    const p=new URLSearchParams({
      action:"save",fecha,
      sucursal_id:b.id,sucursal_nombre:b.name,
      objetivo_dia:b.objetivoDia,venta_real:b.ventaReal,
      loter_obj:b.loterObj,loter_real:b.loterReal,
      adop_obj:b.adopObj,adop_real:b.adopReal,
      servicios_obj:b.serviciosObj,servicios_real:b.serviciosReal,
      recargas_obj:b.recargasObj,recargas_real:b.recargasReal,
      pakete_obj:b.paketeObj,pakete_real:b.paketeReal,
      ciclicos_obj:b.ciclicosObj,ciclicos_real:b.ciclicosReal,
      manuales_obj:b.manualesObj,manuales_real:b.manualesReal
    });
    const r=await fetch(`${API}?${p}`);return await r.json();
  }catch(e){console.error(e);return null;}
}
async function apiRead(fecha){
  try{const r=await fetch(`${API}?action=read&fecha=${fecha}`);return await r.json();}catch(e){console.error(e);return null;}
}
function fromApi(r){return{id:Number(r.sucursal_id),name:r.sucursal_nombre||`Sucursal ${r.sucursal_id}`,objetivoDia:Number(r.objetivo_dia)||0,ventaReal:Number(r.venta_real)||0,loterObj:Number(r.loter_obj)||0,loterReal:Number(r.loter_real)||0,adopObj:Number(r.adop_obj)||0,adopReal:Number(r.adop_real)||0,serviciosObj:Number(r.servicios_obj)||0,serviciosReal:Number(r.servicios_real)||0,recargasObj:Number(r.recargas_obj)||0,recargasReal:Number(r.recargas_real)||0,paketeObj:Number(r.pakete_obj)||0,paketeReal:Number(r.pakete_real)||0,ciclicosObj:Number(r.ciclicos_obj)||0,ciclicosReal:Number(r.ciclicos_real)||0,manualesObj:Number(r.manuales_obj)||0,manualesReal:Number(r.manuales_real)||0}}

// Save all branches one by one
async function apiSaveAll(branches,fecha){
  let ok=0,fail=0;
  for(const b of branches){
    const res=await apiSaveOne(b,fecha);
    if(res&&res.status==="ok")ok++;else fail++;
  }
  return{ok,fail};
}

function Donut({percentage:p,size:s=120}){
  const r=(s-14)/2,c=2*Math.PI*r,f=Math.min(p,100),o=c-(f/100)*c;
  const cl=f>=80?"var(--green)":f>=50?"var(--blue)":f>=25?"var(--orange)":"var(--red)";
  return<svg width={s} height={s} style={{display:"block",margin:"0 auto"}}><circle cx={s/2} cy={s/2} r={r} fill="none" stroke="var(--border-light)" strokeWidth="9"/><circle cx={s/2} cy={s/2} r={r} fill="none" stroke={cl} strokeWidth="9" strokeDasharray={c} strokeDashoffset={o} strokeLinecap="round" transform={`rotate(-90 ${s/2} ${s/2})`} style={{transition:"stroke-dashoffset .6s ease"}}/><text x="50%" y="50%" textAnchor="middle" dy=".35em" style={{fontSize:s*.21,fontWeight:800,fill:"var(--text)",fontFamily:"monospace"}}>{f.toFixed(1)}%</text></svg>
}
function Prog({value:v,max:m,color:c="var(--blue)"}){const p=m?Math.min((v/m)*100,100):0;return<div className="progress-bg"><div className="progress-fill" style={{width:`${p}%`,background:(m&&v>m)?"var(--green)":c}}/></div>}
function MRow({label:l,obj:o,real:r,isMoney:$,color:c="var(--blue)"}){const a=pct(r,o);return<div className="metric-row"><span style={{width:80,fontSize:12,color:"var(--text-mid)",fontWeight:600}}>{l}</span><span style={{width:62,fontSize:11,color:"var(--text-light)",textAlign:"right"}}>{$?"$":""}{$?fmt(o):o}</span><span style={{width:62,fontSize:11,color:"var(--text)",textAlign:"right",fontWeight:700}}>{$?"$":""}{$?fmt(r):r}</span><div style={{flex:1}}><Prog value={r} max={o} color={c}/></div><span style={{width:52,fontSize:11,textAlign:"right",fontWeight:700,color:a>=100?"var(--green)":a>=50?"var(--blue)":"var(--red)"}}>{a.toFixed(1)}%</span></div>}
function EF({label:l,value:v,onChange:fn,step:s}){return<div className="edit-field"><label>{l}</label><input type="number" step={s||1} min={0} value={v} onChange={e=>fn(Number(e.target.value)||0)}/></div>}
function Toast({msg,type,onDone}){useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t)},[]);return<div className="toast" style={{background:type==="ok"?"var(--green)":type==="error"?"var(--red)":"var(--orange)"}}>{msg}</div>}

function App(){
  const[branches,setB]=useState(Array.from({length:10},(_,i)=>mkB(i+1)));
  const[selId,setSel]=useState(null);
  const[edit,setEdit]=useState(false);
  const[tab,setTab]=useState("sucursales");
  const[now,setNow]=useState(new Date());
  const[syncing,setSyncing]=useState(false);
  const[online,setOnline]=useState(false);
  const[lastSync,setLS]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[toast,setToast]=useState(null);
  const[showMgr,setShowMgr]=useState(false);
  const changedRef=useRef(new Set());
  const saveRef=useRef(null);
  const skipRef=useRef(false);

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t)},[]);

  // Load
  useEffect(()=>{(async()=>{
    setSyncing(true);
    const res=await apiRead(dKey());
    if(res&&res.status==="ok"){
      setOnline(true);
      if(res.data?.length>0){const rm=res.data.map(fromApi);setB(p=>{const ids=new Set(rm.map(b=>b.id));return[...rm,...p.filter(b=>!ids.has(b.id))].sort((a,b)=>a.id-b.id)});}
      setLS(Date.now());setToast({msg:"✓ Conectado a Google Sheets",type:"ok"});
    }else{setToast({msg:"⚠ Sin conexión",type:"error"});}
    setSyncing(false);setLoaded(true);
  })()},[]);

  // Poll 15s
  useEffect(()=>{if(!loaded)return;const t=setInterval(async()=>{
    if(skipRef.current)return;
    const res=await apiRead(dKey());
    if(res?.status==="ok"&&res.data?.length>0){setOnline(true);const rm=res.data.map(fromApi);setB(p=>{const ids=new Set(rm.map(b=>b.id));return[...rm,...p.filter(b=>!ids.has(b.id))].sort((a,b)=>a.id-b.id)});setLS(Date.now());}
  },15000);return()=>clearInterval(t)},[loaded]);

  // Save only changed branches, one at a time
  const doSave=useCallback(async(data,ids)=>{
    skipRef.current=true;setSyncing(true);
    const fecha=dKey();
    const toSave=ids&&ids.size>0?data.filter(b=>ids.has(b.id)):data;
    let ok=0;
    for(const b of toSave){
      const res=await apiSaveOne(b,fecha);
      if(res?.status==="ok")ok++;
    }
    if(ok>0){setOnline(true);setLS(Date.now());setToast({msg:`✓ ${ok} sucursal${ok>1?"es":""} guardada${ok>1?"s":""}`,type:"ok"});}
    else setToast({msg:"⚠ Error al guardar",type:"error"});
    changedRef.current=new Set();
    setSyncing(false);setTimeout(()=>{skipRef.current=false},6000);
  },[]);

  // Track changes and debounce save
  const updateBranch=useCallback((id,f,v)=>{
    setB(p=>p.map(b=>b.id===id?{...b,[f]:v}:b));
    changedRef.current.add(id);
    if(saveRef.current)clearTimeout(saveRef.current);
    saveRef.current=setTimeout(()=>{
      setB(curr=>{doSave(curr,new Set(changedRef.current));return curr;});
    },4000);
  },[doSave]);

  const syncNow=async()=>{
    setSyncing(true);
    const fecha=dKey();
    for(const b of branches){await apiSaveOne(b,fecha);}
    const res=await apiRead(fecha);
    if(res?.status==="ok"&&res.data?.length>0){const rm=res.data.map(fromApi);setB(p=>{const ids=new Set(rm.map(b=>b.id));return[...rm,...p.filter(b=>!ids.has(b.id))].sort((a,b)=>a.id-b.id)});}
    setOnline(true);setLS(Date.now());setToast({msg:"✓ Sincronización completa",type:"ok"});setSyncing(false);
  };

  const sel=branches.find(b=>b.id===selId);
  const tObj=branches.reduce((s,b)=>s+b.objetivoDia,0);
  const tReal=branches.reduce((s,b)=>s+b.ventaReal,0);
  const tPct=pct(tReal,tObj);
  const tStr=now.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});

  if(!loaded)return<div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{fontSize:40}}>🏪</div><div style={{fontSize:16,fontWeight:700,color:"var(--blue)"}}>Conectando...</div></div>;

  // Detail
  if(selId&&sel){
    const ap=pct(sel.ventaReal,sel.objetivoDia),falt=Math.max(sel.objetivoDia-sel.ventaReal,0);
    return<div style={{minHeight:"100vh",background:"var(--bg-soft)"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      <div style={{background:"var(--bg)",borderBottom:"2px solid var(--blue)",padding:"14px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:10}}>
        <button onClick={()=>{setSel(null);setEdit(false)}} style={{background:"none",border:"none",color:"var(--blue)",fontSize:22,cursor:"pointer"}}>←</button>
        <div style={{flex:1}}><div style={{fontSize:16,fontWeight:800}}>{sel.name}</div><div style={{fontSize:11,color:"var(--text-light)"}}>{fDate(now)} • {tStr}</div></div>
        <div style={{width:8,height:8,borderRadius:"50%",background:syncing?"var(--orange)":online?"var(--green)":"var(--red)"}}/>
        <button onClick={()=>setEdit(!edit)} style={{background:edit?"var(--blue)":"var(--bg)",border:"1.5px solid var(--blue)",borderRadius:8,color:edit?"#fff":"var(--blue)",padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{edit?"✓ Listo":"✎ Editar"}</button>
      </div>
      <div style={{padding:16}}>
        <div style={{background:"var(--bg)",borderRadius:14,padding:18,display:"flex",alignItems:"center",gap:18,border:"2px solid var(--blue)"}}>
          <Donut percentage={ap} size={100}/><div style={{flex:1}}>
            <div style={{fontSize:11,color:"var(--text-light)"}}>Objetivo</div><div style={{fontSize:18,fontWeight:800,fontFamily:"monospace"}}>${fmt(sel.objetivoDia)}</div>
            <div style={{fontSize:11,color:"var(--text-light)",marginTop:6}}>Venta real</div><div style={{fontSize:16,fontWeight:700,color:"var(--blue)",fontFamily:"monospace"}}>${fmt(sel.ventaReal)}</div>
            <div style={{fontSize:11,color:"var(--text-light)",marginTop:6}}>Faltante</div><div style={{fontSize:14,fontWeight:600,color:"var(--orange)",fontFamily:"monospace"}}>${fmt(falt)}</div>
          </div>
        </div>
      </div>
      {edit?<div style={{padding:"0 16px 40px"}}>
        <div className="section" style={{marginBottom:14}}><div className="edit-field"><label>Nombre de Sucursal</label><input value={sel.name} onChange={e=>updateBranch(sel.id,"name",e.target.value)} style={{fontWeight:700,fontSize:16,background:"var(--bg-soft)",border:"1.5px solid var(--border-light)",borderRadius:8,padding:"10px 12px",color:"var(--text)",outline:"none",width:"100%"}}/></div></div>
        <div className="section"><div className="edit-grid">
          <div style={{gridColumn:"1/-1",fontSize:13,fontWeight:700,color:"var(--blue)"}}>Objetivos</div>
          <EF label="Obj. Día ($)" value={sel.objetivoDia} onChange={v=>updateBranch(sel.id,"objetivoDia",v)} step={.01}/>
          <EF label="Loter" value={sel.loterObj} onChange={v=>updateBranch(sel.id,"loterObj",v)}/><EF label="Adop" value={sel.adopObj} onChange={v=>updateBranch(sel.id,"adopObj",v)}/>
          <EF label="Servicios" value={sel.serviciosObj} onChange={v=>updateBranch(sel.id,"serviciosObj",v)}/><EF label="Recargas ($)" value={sel.recargasObj} onChange={v=>updateBranch(sel.id,"recargasObj",v)} step={.01}/>
          <EF label="Pakete" value={sel.paketeObj} onChange={v=>updateBranch(sel.id,"paketeObj",v)}/><EF label="Cíclicos" value={sel.ciclicosObj} onChange={v=>updateBranch(sel.id,"ciclicosObj",v)}/>
          <EF label="Manuales" value={sel.manualesObj} onChange={v=>updateBranch(sel.id,"manualesObj",v)}/>
          <div style={{gridColumn:"1/-1",fontSize:13,fontWeight:700,color:"var(--green)",marginTop:8}}>Datos Reales</div>
          <EF label="Venta Real ($)" value={sel.ventaReal} onChange={v=>updateBranch(sel.id,"ventaReal",v)} step={.01}/>
          <EF label="Loter" value={sel.loterReal} onChange={v=>updateBranch(sel.id,"loterReal",v)}/><EF label="Adop" value={sel.adopReal} onChange={v=>updateBranch(sel.id,"adopReal",v)}/>
          <EF label="Servicios" value={sel.serviciosReal} onChange={v=>updateBranch(sel.id,"serviciosReal",v)}/><EF label="Recargas ($)" value={sel.recargasReal} onChange={v=>updateBranch(sel.id,"recargasReal",v)} step={.01}/>
          <EF label="Pakete" value={sel.paketeReal} onChange={v=>updateBranch(sel.id,"paketeReal",v)}/><EF label="Cíclicos" value={sel.ciclicosReal} onChange={v=>updateBranch(sel.id,"ciclicosReal",v)}/>
          <EF label="Manuales" value={sel.manualesReal} onChange={v=>updateBranch(sel.id,"manualesReal",v)}/>
        </div></div>
      </div>:<div style={{padding:"0 16px 40px"}}>
        <div className="section">
          <MRow label="Loter" obj={sel.loterObj} real={sel.loterReal} color="var(--orange)"/><MRow label="Adop" obj={sel.adopObj} real={sel.adopReal} color="#7C3AED"/>
          <MRow label="Servicios" obj={sel.serviciosObj} real={sel.serviciosReal} color="var(--blue-mid)"/><MRow label="Recargas" obj={sel.recargasObj} real={sel.recargasReal} isMoney color="var(--orange)"/>
          <MRow label="Pakete" obj={sel.paketeObj} real={sel.paketeReal} color="#DB2777"/>
        </div>
        <div className="section"><div style={{fontSize:13,fontWeight:700,color:"var(--blue)",marginBottom:8}}>Conteos Diarios</div>
          <MRow label="Cíclicos" obj={sel.ciclicosObj} real={sel.ciclicosReal} color="var(--green)"/><MRow label="Manuales" obj={sel.manualesObj} real={sel.manualesReal} color="#0D9488"/>
        </div>
      </div>}
    </div>
  }

  // Main
  return<div style={{minHeight:"100vh",background:"var(--bg-soft)"}}>
    {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    <div className="header">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontSize:11,fontWeight:700,color:"var(--orange-light)",textTransform:"uppercase",letterSpacing:2}}>Neto</div><div style={{fontSize:20,fontWeight:800,color:"#fff"}}>Avance del Día</div></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:"50%",background:syncing?"var(--orange)":online?"var(--green)":"var(--red)"}}/><span style={{fontSize:10,color:"rgba(255,255,255,.8)",fontWeight:600}}>{syncing?"Guardando...":online?"Conectado":"Offline"}</span></div>
      </div>
      <div style={{marginTop:8,fontSize:12,color:"rgba(255,255,255,.8)",fontWeight:600}}>📅 {fDate(now)} — {tStr}</div>
      <div style={{marginTop:12,display:"flex",alignItems:"center",gap:18,background:"rgba(255,255,255,.12)",borderRadius:14,padding:14}}>
        <Donut percentage={tPct} size={85}/><div style={{flex:1}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.7)"}}>Objetivo Total</div><div style={{fontSize:17,fontWeight:800,fontFamily:"monospace",color:"#fff"}}>${fmt(tObj)}</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,.7)",marginTop:5}}>Venta Total</div><div style={{fontSize:15,fontWeight:700,color:"#FED7AA",fontFamily:"monospace"}}>${fmt(tReal)}</div>
        </div>
      </div>
    </div>

    {tab==="sucursales"?<div style={{padding:"14px 14px 100px"}}>
      <div style={{fontSize:12,fontWeight:700,color:"var(--text-light)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Sucursales ({branches.length})</div>
      {branches.map(b=>{const bp=pct(b.ventaReal,b.objetivoDia),bc=bp>=80?"var(--green)":bp>=50?"var(--blue)":bp>=25?"var(--orange)":"var(--red)";
        return<div key={b.id} className="card" onClick={()=>setSel(b.id)}>
          <Donut percentage={bp} size={52}/><div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700}}>{b.name}</div><div style={{fontSize:11,color:"var(--text-light)",marginTop:2}}>Obj: ${fmt(b.objetivoDia)}</div>
            <div style={{marginTop:5}}><Prog value={b.ventaReal} max={b.objetivoDia} color={bc}/></div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span style={{fontSize:11,color:"var(--text-light)"}}>Venta: <b style={{color:"var(--text)"}}>${fmt(b.ventaReal)}</b></span><span style={{fontSize:12,fontWeight:800,color:bc}}>{bp.toFixed(1)}%</span></div>
          </div><div style={{color:"var(--border-light)",fontSize:18}}>›</div>
        </div>})}
    </div>:tab==="zona"?<div style={{padding:"14px 14px 100px"}}>
      <div style={{textAlign:"center",marginBottom:12}}><div style={{background:"var(--blue-light)",borderRadius:10,padding:"10px 16px",display:"inline-block",border:"1px solid var(--border-light)"}}><span style={{fontSize:13,fontWeight:700,color:"var(--blue)"}}>📅 {fDate(now)}</span></div></div>
      <div style={{background:"var(--bg)",borderRadius:16,padding:20,border:"2px solid var(--blue)",display:"flex",alignItems:"center",gap:20,marginBottom:12}}>
        <Donut percentage={tPct} size={110}/><div style={{flex:1}}>
          <div style={{fontSize:11,color:"var(--text-light)"}}>Objetivo Zona</div><div style={{fontSize:20,fontWeight:800,fontFamily:"monospace"}}>${fmt(tObj)}</div>
          <div style={{fontSize:11,color:"var(--text-light)",marginTop:8}}>Venta Real</div><div style={{fontSize:18,fontWeight:700,color:"var(--blue)",fontFamily:"monospace"}}>${fmt(tReal)}</div>
          <div style={{fontSize:11,color:"var(--text-light)",marginTop:8}}>Faltante</div><div style={{fontSize:15,fontWeight:600,color:"var(--orange)",fontFamily:"monospace"}}>${fmt(Math.max(tObj-tReal,0))}</div>
        </div>
      </div>
      <div className="section"><div style={{fontSize:14,fontWeight:700,color:"var(--blue)",marginBottom:10}}>Desglose Zona</div>
        {(()=>{const s=f=>branches.reduce((a,b)=>a+(b[f]||0),0);return<><MRow label="Loter" obj={s("loterObj")} real={s("loterReal")} color="var(--orange)"/><MRow label="Adop" obj={s("adopObj")} real={s("adopReal")} color="#7C3AED"/><MRow label="Servicios" obj={s("serviciosObj")} real={s("serviciosReal")} color="var(--blue-mid)"/><MRow label="Recargas" obj={s("recargasObj")} real={s("recargasReal")} isMoney color="var(--orange)"/><MRow label="Pakete" obj={s("paketeObj")} real={s("paketeReal")} color="#DB2777"/><MRow label="Cíclicos" obj={s("ciclicosObj")} real={s("ciclicosReal")} color="var(--green)"/><MRow label="Manuales" obj={s("manualesObj")} real={s("manualesReal")} color="#0D9488"/></>})()}
      </div>
      <div className="section"><div style={{fontSize:14,fontWeight:700,color:"var(--green)",marginBottom:10}}>🏆 Top Sucursales</div>
        {[...branches].sort((a,b)=>pct(b.ventaReal,b.objetivoDia)-pct(a.ventaReal,a.objetivoDia)).slice(0,3).map((b,i)=>{const bp=pct(b.ventaReal,b.objetivoDia);return<div key={b.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid var(--blue-light)"}}><span style={{fontSize:16,width:26}}>{["🥇","🥈","🥉"][i]}</span><span style={{flex:1,fontSize:13,fontWeight:600}}>{b.name}</span><span style={{fontSize:12,color:"var(--text-light)"}}>${fmt(b.ventaReal)}</span><span style={{fontSize:12,fontWeight:800,color:bp>=50?"var(--green)":"var(--orange)",width:50,textAlign:"right"}}>{bp.toFixed(1)}%</span></div>})}
      </div>
      <div className="section"><div style={{fontSize:14,fontWeight:700,color:"var(--blue)",marginBottom:10}}>🏪 Por Sucursal</div>
        {branches.map(b=>{const bp=pct(b.ventaReal,b.objetivoDia),bc=bp>=80?"var(--green)":bp>=50?"var(--blue)":bp>=25?"var(--orange)":"var(--red)";return<div key={b.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid var(--blue-light)"}}><span style={{width:80,fontSize:11,color:"var(--text-mid)",fontWeight:600}}>{b.name}</span><div style={{flex:1}}><Prog value={b.ventaReal} max={b.objetivoDia} color={bc}/></div><span style={{fontSize:11,color:"var(--text-light)",width:78,textAlign:"right"}}>${fmt(b.ventaReal)}</span><span style={{fontSize:11,fontWeight:800,color:bc,width:46,textAlign:"right"}}>{bp.toFixed(1)}%</span></div>})}
      </div>
    </div>:<div style={{padding:"16px 16px 100px"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>Configuración</div>
      <div className="section">
        <div style={{fontSize:14,fontWeight:700,color:"var(--blue)",marginBottom:10}}>📡 Google Sheets</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:10,height:10,borderRadius:"50%",background:online?"var(--green)":"var(--red)"}}/><span style={{fontSize:13,fontWeight:600}}>{online?"Conectado":"Sin conexión"}</span></div>
        <div style={{fontSize:11,color:"var(--text-light)",marginBottom:10}}>Última sync: {lastSync?new Date(lastSync).toLocaleTimeString("es-MX"):"Nunca"}</div>
        <button className="btn" style={{background:"var(--blue)",color:"#fff"}} onClick={syncNow} disabled={syncing}>{syncing?"⏳ Guardando...":"🔄 Sincronizar Ahora"}</button>
      </div>
      <button className="btn" style={{background:"var(--bg)",border:"1.5px solid var(--blue)",color:"var(--blue)"}} onClick={()=>setShowMgr(true)}>🏪 Gestionar Sucursales ({branches.length})</button>
      <button className="btn" style={{background:"var(--red)",color:"#fff"}} onClick={()=>{if(confirm("¿Reiniciar datos reales a 0?")){setB(p=>p.map(b=>({...b,ventaReal:0,loterReal:0,adopReal:0,serviciosReal:0,recargasReal:0,paketeReal:0,ciclicosReal:0,manualesReal:0})));changedRef.current=new Set(branches.map(b=>b.id))}}}>🗑️ Reiniciar Datos del Día</button>
      {showMgr&&<div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setShowMgr(false)}}><div className="modal">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><span style={{fontSize:18,fontWeight:800}}>Sucursales</span><button onClick={()=>setShowMgr(false)} style={{background:"var(--bg-soft)",border:"1px solid var(--border-light)",borderRadius:8,width:34,height:34,fontSize:16,cursor:"pointer"}}>✕</button></div>
        {branches.map((b,i)=><div key={b.id} style={{background:"var(--bg-soft)",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:8,marginBottom:6,border:"1px solid var(--border-light)"}}><span style={{fontSize:12,color:"var(--text-light)",fontWeight:700,width:22}}>{i+1}</span><input value={b.name} onChange={e=>updateBranch(b.id,"name",e.target.value)} style={{flex:1,background:"var(--bg)",border:"1px solid var(--border-light)",borderRadius:8,padding:"6px 10px",fontSize:14,outline:"none"}}/><button onClick={()=>{if(branches.length>1&&confirm(`¿Eliminar "${b.name}"?`))setB(p=>p.filter(x=>x.id!==b.id))}} style={{background:"none",border:"1px solid var(--border-light)",borderRadius:6,color:branches.length<=1?"var(--border-light)":"var(--red)",padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✕</button></div>)}
        <button className="btn" style={{background:"var(--blue)",color:"#fff",marginTop:12}} onClick={()=>{const mx=branches.reduce((m,b)=>Math.max(m,b.id),0);setB(p=>[...p,mkB(mx+1)])}}>+ Agregar Sucursal</button>
      </div></div>}
    </div>}

    <div className="tab-bar">
      {[{id:"sucursales",l:"Sucursales",i:"🏪"},{id:"zona",l:"Zona",i:"📊"},{id:"config",l:"Config",i:"⚙️"}].map(t=><button key={t.id} className={`tab-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}><span>{t.i}</span><span>{t.l}</span></button>)}
    </div>
  </div>
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
