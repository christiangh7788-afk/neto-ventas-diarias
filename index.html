
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Neto - Avance de Ventas</title>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<style>
  :root { --primary-color: #007bff; }
  body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
  .notif-modal-container { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
  .notif-modal-content { background: white; border-radius: 20px; width: 100%; max-width: 380px; padding: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .notif-btn-primary { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; }
  #settings-notif-section { display: none; padding: 20px; }
</style>
</head>
<body>

<div id="main-content" style="padding: 20px; text-align: center;">
    <h2>Cargando Dashboard...</h2>
    <p>Si ves esto, la estructura básica está funcionando.</p>
</div>

<div id="notif-modal-container" class="notif-modal-container">
  <div class="notif-modal-content">
    <h3 style="margin-top:0">🔔 Activar Notificaciones</h3>
    <p style="font-size: 14px; color: #666;">Recibe recordatorios de tus ventas directamente en tu dispositivo.</p>
    <button class="notif-btn-primary" onclick="handlePushActivation()">Activar ahora</button>
    <button style="background:none; border:none; color:#999; margin-top:10px; cursor:pointer;" onclick="closeNotifModal()">Más tarde</button>
  </div>
</div>

<div id="settings-notif-section">
  <div style="background: white; border-radius: 15px; padding: 20px; border: 1px solid #e0e0e0;">
    <h4 style="margin-top: 0;">Configuración de Alertas</h4>
    <button class="notif-btn-primary" onclick="handlePushActivation()">Habilitar Notificaciones</button>
  </div>
</div>

<script>
// Manejo de errores para que no se quede en blanco
window.addEventListener('error', function(e) {
    console.log("Error detectado, desbloqueando pantalla...");
    document.getElementById('main-content').innerHTML = "<h3>Error al cargar notificaciones.</h3><p>La app sigue funcionando, pero revisa el AppID.</p>";
});

window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  try {
    await OneSignal.init({
      appId: "81c21f57-8ac2-48c5-b09f-156311909bdd",
      serviceWorkerPath: "/OneSignalSDK.sw.js",
    });

    const isSubscribed = await OneSignal.User.PushSubscription.optedIn;
    const hasDismissed = localStorage.getItem('notif_modal_dismissed');

    // Mostrar sección configuración si no está suscrito
    if (!isSubscribed) {
      document.getElementById('settings-notif-section').style.display = 'block';
    }

    // Mostrar modal si no está suscrito ni lo ha cerrado antes
    if (!isSubscribed && !hasDismissed) {
      document.getElementById('notif-modal-container').style.display = 'flex';
    }
  } catch (err) {
    console.error("OneSignal no pudo iniciar:", err);
  }
});

async function handlePushActivation() {
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.Notifications.requestPermission();
    closeNotifModal();
  });
}

function closeNotifModal() {
  document.getElementById('notif-modal-container').style.display = 'none';
}

function neverAskAgain() {
  localStorage.setItem('notif_modal_dismissed', 'true');
  closeNotifModal();
}
</script>
</body>
</html>
