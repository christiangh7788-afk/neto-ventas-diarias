<script>
// Configuración de OneSignal con manejo manual del prompt
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "81c21f57-8ac2-48c5-b09f-156311909bdd",
    serviceWorkerPath: "/OneSignalSDK.sw.js",
    promptOptions: {
      slidedown: {
        prompts: [{
          type: "push",
          autoPrompt: false, // Desactivamos auto-prompt nativo
          text: {
            actionMessage: "Recibe recordatorios para capturar tus ventas del dia.",
            acceptButton: "Permitir",
            cancelButton: "Ahora no"
          }
        }]
      }
    }
  });

  // Verificar si ya tenemos permiso o si el usuario ya vio el modal
  checkNotificationStatus();
});

// Función para verificar estado de notificaciones
async function checkNotificationStatus() {
  try {
    const permission = await OneSignal.Notifications.permission;
    const modalSeen = localStorage.getItem('neto_notif_modal_seen');

    // Si ya tiene permiso otorgado o rechazó permanentemente, no mostrar modal
    if (permission === true) {
      console.log('Notificaciones ya activadas');
      return;
    }

    // Si el usuario ya vio el modal (aceptó o rechazó), respetar su decisión por 30 días
    if (modalSeen) {
      if (modalSeen === 'never') {
        console.log('Usuario rechazó permanentemente');
        return;
      }
      const seenDate = new Date(modalSeen);
      const now = new Date();
      const daysDiff = (now - seenDate) / (1000 * 60 * 60 * 24);

      // Si han pasado más de 30 días, permitir mostrar de nuevo
      if (daysDiff < 30) {
        console.log('Modal ya visto hace menos de 30 días');
        return;
      }
    }

    // Mostrar modal después de un delay (dar tiempo a que cargue la app)
    setTimeout(() => {
      showNotificationModal();
    }, 3000);

  } catch (e) {
    console.error('Error checking notification status:', e);
  }
}

// Mostrar el modal custom
function showNotificationModal() {
  const modal = document.getElementById('notif-modal');
  if (modal) {
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
}

// Cerrar modal
function closeNotificationModal() {
  const modal = document.getElementById('notif-modal');
  if (modal) {
    modal.classList.remove('active');
    document.body.style.overflow = '';
  }
}

// Aceptar notificaciones
async function acceptNotifications() {
  closeNotificationModal();
  localStorage.setItem('neto_notif_modal_seen', new Date().toISOString());

  try {
    await OneSignal.Slidedown.promptPush();
    showToast('¡Notificaciones activadas! Recibirás recordatorios de ventas.', 'success');
  } catch (e) {
    console.error('Error requesting permission:', e);
    showToast('No se pudieron activar las notificaciones. Intenta desde Configuración.', 'error');
  }
}

// Rechazar notificaciones (temporal)
function declineNotifications() {
  closeNotificationModal();
  localStorage.setItem('neto_notif_modal_seen', new Date().toISOString());
  showToast('Puedes activarlas luego desde Configuración', 'info');
}

// Rechazar permanentemente
function declineNotificationsPermanent() {
  closeNotificationModal();
  localStorage.setItem('neto_notif_modal_seen', 'never');
}
</script>

  filtered.forEach(r=>{
    const key=r._zona+'_'+r.sucursal_id;
    if(!byBranch[key])byBranch[key]={nombre:r.nombre||'Suc '+r.sucursal_id,zona:r._zona,loterR:0,loterO:0,adopR:0,adopO:0,servR:0,servO:0,recR:0,recO:0,retR:0,retO:0,asiR:0,asiO:0,ciclR:0,ciclO:0,manR:0,manO:0,vn:0,obj:0};
    const b=byBranch[key];
    b.loterR+=Number(r.loter_real||0);b.loterO+=Number(r.loter_obj||0);
    b.adopR+=Number(r.adop_real||0);b.adopO+=Number(r.adop_obj||0);
    b.servR+=Number(r.servicios_real||0);b.servO+=Number(r.servicios_obj||0);
    b.recR+=Number(r.recargas_real||0);b.recO+=Number(r.recargas_obj||0);
    b.retR+=Number(r.retiros_real||0);b.retO+=Number(r.retiros_obj||0);
    b.asiR+=Number(r.asistencia_real||0);b.asiO+=Number(r.asistencia_obj||0);
    b.ciclR+=Number(r.ciclicos_real||0);b.ciclO+=Number(r.ciclicos_obj||0);
    b.manR+=Number(r.manuales_real||0);b.manO+=Number(r.manuales_obj||0);
    b.vn+=Number(r.venta_real||0);b.obj+=Number(r.objetivo_dia||0);
  });
  Object.values(byBranch).sort((a,b)=>{const za=zonas.find(z=>z.id===a.zona);const zb=zonas.find(z=>z.id===b.zona);return (za?za.nombre:'').localeCompare(zb?zb.nombre:'');}).forEach(b=>{
    const z=zonas.find(z=>z.id===b.zona);
    indData.push([z?z.nombre:b.zona,b.nombre,b.loterR,b.loterO,b.adopR,b.adopO,b.servR,b.servO,b.recR,b.recO,b.retR,b.retO,b.asiR,b.asiO,b.ciclR,b.ciclO,b.manR,b.manO,b.obj>0?b.vn/b.obj:0]);
  });
  const nBranches=Object.keys(byBranch).length;
  const dataStart=3; const dataEnd=dataStart+nBranches-1;
  // Totales con fórmulas
  indData.push(['','','','','','','','','','','','','','','','','','','']);
  indData.push(['TOTALES Y PROYECCIÓN DE CIERRE — SUMA TODAS LAS TIENDAS','','','','','','','','','','','','','','','','','','']);
  indData.push(['Indicador','Real Semana','Obj. Semana','% Semana','Prom. Diario','Proyección Mes','Obj. Mes','% Proyectado','','','','','','','','','','','']);
  const totRow=indData.length+1;
  const indList=[
    ['Loter',3,4,2000],['Adop',5,6,5000],['Servicios',7,8,2000],
    ['Recargas $',9,10,50000],['Retiros',11,12,1000],['Asistencia',13,14,100],
    ['Ciclicos',15,16,200],['Manuales',17,18,200],
  ];
  const diasDatosInd=periodo==='hoy'?1:periodo==='semana'?5:diasTrans;
  indList.forEach(([name,cr,co,objMesVal],idx)=>{
    const sumReal=Object.values(byBranch).reduce((a,b)=>{
      const vals=[b.loterR,b.adopR,b.servR,b.recR,b.retR,b.asiR,b.ciclR,b.manR];
      return a+vals[idx];
    },0);
    const sumObj=Object.values(byBranch).reduce((a,b)=>{
      const vals=[b.loterO,b.adopO,b.servO,b.recO,b.retO,b.asiO,b.ciclO,b.manO];
      return a+vals[idx];
    },0);
    const pctSem=sumObj>0?sumReal/sumObj:0;
    const promDia=sumReal/diasDatosInd;
    const proyMes=promDia*diasMes;
    const pctProy=objMesVal>0?proyMes/objMesVal:0;
    indData.push([name,sumReal,sumObj,pctSem,promDia,proyMes,objMesVal,pctProy,
      '','','','','','','','','','','']);
  });
  indData.push(['','','','','','','','','','','','','','','','','','','']);
  indData.push(['Leyenda:','Promedio diario calculado','Proyección de cierre','Valores editables en hoja Config','','','','','','','','','','','','','','','']);
  const wsInd=XLSX.utils.aoa_to_sheet(indData);
  wsInd['!cols']=[{wch:16},{wch:22},{wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:10},{wch:10},{wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:10}];
  XLSX.utils.book_append_sheet(wb,wsInd,'Indicadores');

  const fname='Neto_Reporte_'+periodoLabel.replace(/ /g,'_')+'_'+todayKey+'.xlsx';
  // Mobile-compatible download
  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  // Try Web Share API first (mobile PWA)
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],fname,{type:blob.type})]})){
    try{
      await navigator.share({files:[new File([blob],fname,{type:blob.type})],title:'Neto Reporte',text:'Reporte de Avance de Ventas'});
      URL.revokeObjectURL(url);
      return;
    }catch(e){if(e.name!=='AbortError')console.log('Share failed:',e);}
  }
  // Fallback: standard download link
  const a=document.createElement('a');
  a.href=url;
  a.download=fname;
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}
